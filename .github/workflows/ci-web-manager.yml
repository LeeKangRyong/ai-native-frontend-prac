name: CI - Management Web

on:
  push:
    paths:
      - 'prac-fe-web-manager/**'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prac-fe-web-manager

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: prac-fe-web-manager/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --watchAll=false

      # 아직 build 단계는 필요 없어서 주석 처리
      # - name: Build
      #   run: npm run build
